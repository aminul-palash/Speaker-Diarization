name: colab-gpu-env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10

  # PyTorch GPU stack (CUDA 11.8 - stable for most Colab setups)
  - pytorch=2.1.0
  - torchvision
  - torchaudio
  - pytorch-cuda=11.8

  # Core scientific stack
  - numpy=1.26.4
  - scipy=1.15.3
  - pandas=2.3.3
  - scikit-learn=1.7.2
  - matplotlib=3.8.0
  - pillow=12.2.0
  - tqdm=4.67.3

